version: "3.8"

services:
  mysql:
    build:
      context: .
      dockerfile: Dockerfile

    restart: always
    container_name: mysql-container
    environment:
 
      MYSQL_ROOT_PASSWORD: abcd@1234
      MYSQL_DATABASE: user_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: