<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="stylesheet" href="/web/css/main.css" />
  </head>
  <body class="sign-in-page">
    {{template "t_navbar.html" .}}

    <div class="site-logo">
      <div class="brand">
        <span class="brand-mark"></span>
        Saturn
      </div>
    </div>

    <main class="card">
      <h1>Sign In</h1>
      <p>Use your username and password to access your account.</p>

      <form action="#" method="post">
        <label>
          Username
          <input
            type="text"
            name="username"
            placeholder="Enter your username"
            required
          />
        </label>

        <label>
          Password
          <input
            type="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </label>

        <button type="submit">Sign In</button>
      </form>

      <p class="helper">
        Do not have an account?
        <a href="/create-account">Create a new account</a>
      </p>
    </main>
  </body>
</html>
