<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Home | Saturn</title>
		<link
			rel="stylesheet"
			href="/web/css/main.css"
		/>
	</head>
	<body class="dashboard-page">
		<a
			class="home-shortcut"
			href="/"
			>Home</a
		>

		<div class="site-logo">
			<div class="brand">
				<span class="brand-mark"></span>
				Saturn
			</div>
		</div>

		<div class="dashboard-shell">
			<header class="dashboard-header">
				<div>
					<h1>This is home page.</h1>
					<h2>Welcome {{.FirstName}} {{.LastName}}....</h2>
					<p class="header-subtitle">Your account is active</p>
				</div>
				<a
					class="home-shortcut sign-out-shortcut"
					href="/signIn"
					>Sign Out</a
				>
			</header>

			<main>
				<section class="post-create-section">
					<h3>Add New Post</h3>
					<form
						action="/posts/create"
						method="POST"
					>
						<div>
							<label for="post-title">Title</label>
							<input
								type="text"
								id="post-title"
								name="title"
								placeholder="Enter post title"
								required
							/>
						</div>

						<div>
							<label for="post-content">Content</label>
							<textarea
								id="post-content"
								name="content"
								rows="6"
								placeholder="Write your post here"
								required
							></textarea>
						</div>

						<button type="submit">Publish Post</button>
					</form>
				</section>
			</main>
		</div>
	</body>
</html>
