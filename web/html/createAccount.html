<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account</title>
    <link rel="stylesheet" href="/web/css/main.css" />
  </head>
  <body class="create-account-page">
    {{template "t_navbar.html" .}} {{template "t_logo.html" .}}

    <main class="card">
      <h1>Create New Account</h1>
      <p>Fill in your details to open your new account.</p>

      <form action="/create-account" method="post">
        <div class="name-row">
          <label>
            First Name {{with .FieldErrors.firstName}}
            <label class="error-text">{{.}}</label>
            {{end}}
            <input
              type="text"
              name="firstName"
              placeholder="First name"
              class="{{if .FieldErrors.firstName}}error{{end}}"
              value="{{.FirstName}}"
            />
          </label>

          <label>
            Last Name{{with .FieldErrors.lastName}}
            <label class="error-text">{{.}}</label>
            {{end}}
            <input
              type="text"
              name="lastName"
              placeholder="Last name"
              class="{{if .FieldErrors.lastName}}error{{end}}"
              value="{{.LastName}}"
            />
          </label>
        </div>

        <label>
          User Name{{with .FieldErrors.username}}
          <label class="error-text">{{.}}</label>
          {{end}}
          <input
            type="text"
            name="username"
            placeholder="Choose a username"
            class="{{if .FieldErrors.username}}error{{end}}"
            value="{{.Username}}"
          />
        </label>

        <label>
          Email{{with .FieldErrors.email}}
          <label class="error-text">{{.}}</label>
          {{end}}
          <input
            type="email"
            name="email"
            placeholder="you@example.com"
            class="{{if .FieldErrors.email}}error{{end}}"
            value="{{.Email}}"
          />
        </label>

        <label>
          Password {{with .FieldErrors.password}}
          <label class="error-text">{{.}}</label>
          {{end}}
          <input
            type="password"
            name="password"
            placeholder="Create a password"
            class="{{if .FieldErrors.password}}error{{end}}"
          />
        </label>

        <button type="submit">Create Account</button>
      </form>

      <p class="helper">
        Already have an account? <a href="/signIn">Sign in</a>
      </p>
    </main>
  </body>
</html>
