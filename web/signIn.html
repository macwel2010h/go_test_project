<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-dark: #0b5f59;
        --border: #d1d5db;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(160deg, #f6f5ef 0%, #e8efe8 100%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.75rem;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-size: 1rem;
      }

      button {
        margin-top: 8px;
        border: 0;
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 1rem;
        font-weight: 700;
        color: #fff;
        background: var(--accent);
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      .helper {
        margin-top: 16px;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .helper a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      .helper a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sign In</h1>
      <p>Use your username and password to access your account.</p>

      <form
        action="#"
        method="post">
        <label>
          Username
          <input
            type="text"
            name="username"
            placeholder="Enter your username"
            required />
        </label>

        <label>
          Password
          <input
            type="password"
            name="password"
            placeholder="Enter your password"
            required />
        </label>

        <button type="submit">Sign In</button>
      </form>

      <p class="helper">
        Do not have an account?
        <a href="createAccount.html">Create a new account</a>
      </p>
    </main>
  </body>
</html>
